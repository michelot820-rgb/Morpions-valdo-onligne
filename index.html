<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<title>Morpion Online</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#1e272e;
color:white;
}

#board{
display:grid;
grid-template-columns:repeat(15,40px);
gap:3px;
justify-content:center;
margin-top:20px;
}

.cell{
width:40px;
height:40px;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.x{color:red;}
.o{color:blue;}

</style>
</head>

<body>

<h2>Morpion Online</h2>

<input id="room" placeholder="Room code">
<button onclick="createRoom()">Create</button>
<button onclick="joinRoom()">Join</button>

<h3 id="status">Ap tann...</h3>

<div id="board"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCKF5yc2D36GVGvFB5BTvHXhb7A_srdxTo",
authDomain:"morpions-6d8cd.firebaseapp.com",
projectId:"morpions-6d8cd"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let size=15
let board=[]
let roomId=null
let current="X"

const boardDiv=document.getElementById("board")
const status=document.getElementById("status")

function createBoard(){

boardDiv.innerHTML=""

for(let r=0;r<size;r++){

board[r]=[]

for(let c=0;c<size;c++){

board[r][c]=""

let cell=document.createElement("div")
cell.className="cell"

cell.onclick=()=>move(r,c)

boardDiv.appendChild(cell)

}

}

}

function draw(){

let cells=document.querySelectorAll(".cell")

let i=0

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){

cells[i].textContent=board[r][c]
cells[i].classList.remove("x","o")

if(board[r][c]=="X") cells[i].classList.add("x")
if(board[r][c]=="O") cells[i].classList.add("o")

i++

}
}

}

async function move(r,c){

if(!roomId) return
if(board[r][c]!="") return

board[r][c]=current

current=current=="X"?"O":"X"

await updateDoc(doc(db,"games",roomId),{
board:board,
player:current
})

}

window.createRoom=async function(){

roomId=Math.random().toString(36).substring(2,7)

document.getElementById("room").value=roomId

createBoard()

await setDoc(doc(db,"games",roomId),{
board:board,
player:"X"
})

listen()

}

window.joinRoom=function(){

roomId=document.getElementById("room").value

createBoard()

listen()

}

function listen(){

onSnapshot(doc(db,"games",roomId),(snap)=>{

let data=snap.data()

board=data.board
current=data.player

draw()

status.textContent="Tou: "+current

})

}

createBoard()

</script>

</body>
</html>
