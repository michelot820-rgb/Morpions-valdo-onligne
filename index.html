<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<title>Morpion Online</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

#board{
display:grid;
grid-template-columns:repeat(15,40px);
gap:3px;
justify-content:center;
margin-top:20px;
}

.cell{
width:40px;
height:40px;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
cursor:pointer;
border-radius:4px;
}

.cell:hover{background:#eee}

.x{color:#e74c3c}
.o{color:#3498db}

button,input{
padding:8px;
margin:5px;
font-size:16px;
}

</style>
</head>

<body>

<h2>Morpion Online 15x15</h2>

<input id="roomInput" placeholder="Room code">
<button onclick="createRoom()">Create</button>
<button onclick="joinRoom()">Join</button>
<button onclick="restartGame()">Restart</button>

<h3 id="status">Ap tann jwè...</h3>

<div id="board"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyCKF5yc2D36GVGvFB5BTvHXhb7A_srdxTo",
authDomain:"morpions-6d8cd.firebaseapp.com",
projectId:"morpions-6d8cd"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const size=15
let board=[]
let roomId=null
let currentPlayer="X"
let gameOver=false

const boardDiv=document.getElementById("board")
const status=document.getElementById("status")

function createBoard(){

boardDiv.innerHTML=""

for(let r=0;r<size;r++){

board[r]=[]

for(let c=0;c<size;c++){

board[r][c]=""

const cell=document.createElement("div")
cell.className="cell"
cell.onclick=()=>playMove(r,c)

boardDiv.appendChild(cell)

}

}

}

function drawBoard(){

const cells=document.querySelectorAll(".cell")

let i=0

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){

cells[i].textContent=board[r][c]

cells[i].classList.remove("x","o")

if(board[r][c]=="X") cells[i].classList.add("x")
if(board[r][c]=="O") cells[i].classList.add("o")

i++

}
}

}

async function playMove(r,c){

if(gameOver||!roomId) return
if(board[r][c]!="") return

board[r][c]=currentPlayer

if(checkWin(r,c)){
gameOver=true
status.textContent="Jwè "+currentPlayer+" genyen!"
}

currentPlayer=currentPlayer=="X"?"O":"X"

drawBoard()

await updateDoc(doc(db,"games",roomId),{
board:board,
player:currentPlayer
})

}

function checkDirection(r,c,dr,dc){

let player=board[r][c]
let count=1
let i=1

while(board[r+dr*i] && board[r+dr*i][c+dc*i]==player){
count++
i++
}

i=1

while(board[r-dr*i] && board[r-dr*i][c-dc*i]==player){
count++
i++
}

return count>=5

}

function checkWin(r,c){

return(
checkDirection(r,c,1,0)||
checkDirection(r,c,0,1)||
checkDirection(r,c,1,1)||
checkDirection(r,c,1,-1)
)

}

window.createRoom=async function(){

roomId=Math.random().toString(36).substring(2,7)

document.getElementById("roomInput").value=roomId

createBoard()

await setDoc(doc(db,"games",roomId),{
board:board,
player:"X"
})

listenGame()

status.textContent="Room: "+roomId

updateURL()

}

window.joinRoom=function(){

roomId=document.getElementById("roomInput").value

createBoard()

listenGame()

status.textContent="Room: "+roomId

updateURL()

}

function listenGame(){

onSnapshot(doc(db,"games",roomId),(snapshot)=>{

let data=snapshot.data()

if(!data) return

board=data.board
currentPlayer=data.player

drawBoard()

if(!gameOver)
status.textContent="Tou jwè "+currentPlayer

})

}

window.restartGame=async function(){

if(!roomId) return

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){
board[r][c]=""
}
}

gameOver=false

await updateDoc(doc(db,"games",roomId),{
board:board,
player:"X"
})

}

function updateURL(){

const url=new URL(window.location)

url.searchParams.set("room",roomId)

history.replaceState(null,"",url)

}

function autoJoin(){

const params=new URLSearchParams(window.location.search)

const room=params.get("room")

if(room){
roomId=room
document.getElementById("roomInput").value=room
createBoard()
listenGame()
}

}

createBoard()
autoJoin()

</script>

</body>
</html>
