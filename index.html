<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Morpion Online Simple</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#0f2027;
color:white;
}

#board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.cell{
width:100px;
height:100px;
background:white;
color:black;
font-size:50px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Morpion Online</h2>

<input id="room" placeholder="Room code">
<button onclick="createRoom()">Create</button>
<button onclick="joinRoom()">Join</button>

<h3 id="status">Ap tann...</h3>

<div id="board"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCKF5yc2D36GVGvFB5BTvHXhb7A_srdxTo",
authDomain:"morpions-6d8cd.firebaseapp.com",
projectId:"morpions-6d8cd"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let board=["","","","","","","","",""]
let player="X"
let room=null

const boardDiv=document.getElementById("board")

function draw(){

boardDiv.innerHTML=""

board.forEach((v,i)=>{

const c=document.createElement("div")
c.className="cell"
c.textContent=v

c.onclick=()=>move(i)

boardDiv.appendChild(c)

})

}

async function move(i){

if(board[i]!="") return

board[i]=player

await updateDoc(doc(db,"games",room),{
board:board,
player:player=="X"?"O":"X"
})

}

window.createRoom=async()=>{

room=document.getElementById("room").value

await setDoc(doc(db,"games",room),{
board:["","","","","","","","",""],
player:"X"
})

listen()

}

window.joinRoom=()=>{

room=document.getElementById("room").value

listen()

}

function listen(){

onSnapshot(doc(db,"games",room),(snap)=>{

const data=snap.data()

board=data.board
player=data.player

draw()

})

}

draw()

</script>

</body>
</html>
